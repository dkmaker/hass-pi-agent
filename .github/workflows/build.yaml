---
name: Build and Publish Add-on

on:
  release:
    types: [published]
  workflow_call:
    inputs:
      tag:
        description: "Release tag (e.g., v0.9.0)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v0.9.0)"
        required: true
        type: string
  pull_request:
    branches:
      - main

env:
  ADDON_SLUG: pi_agent
  ADDON_TARGET: addon

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        arch:
          - amd64
          - aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: version
        run: |
          if [[ -n "${{ inputs.tag }}" ]]; then
            echo "version=${{ inputs.tag }}" | sed 's/version=v/version=/' >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(grep '^version:' addon/config.yaml | awk '{print $2}' | tr -d '\"')" >> "$GITHUB_OUTPUT"
          fi

      - name: Build add-on
        uses: home-assistant/builder@master
        with:
          args: |
            --${{ matrix.arch }} \
            --target ${{ env.ADDON_TARGET }} \
            --version "${{ steps.version.outputs.version }}" \
            ${{ github.event_name == 'pull_request' && '--test' || '--no-cache' }}
