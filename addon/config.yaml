name: Pi Agent for Home Assistant
version: 0.9.6
slug: pi_agent
image: ghcr.io/dkmaker/hass-pi-agent/{arch}-pi_agent
description: >-
  AI coding agent with full Home Assistant access — manage automations,
  entities, dashboards, and more via natural language.
startup: services
ingress: true
ingress_port: 0
ingress_stream: true
init: false
panel_icon: mdi:robot
panel_title: Pi Agent
arch:
  - aarch64
  - amd64
homeassistant_api: true
hassio_api: true
hassio_role: admin
auth_api: true
map:
  - homeassistant_config:rw
  - all_addon_configs:rw
  - ssl:rw
  - share:rw
  - media:rw
  - backup:rw
options:
  default_provider: anthropic
  default_model: ''
  install_integration: true
  anthropic_api_key: ''
  openai_api_key: ''
  google_api_key: ''
  openrouter_api_key: ''
  xai_api_key: ''
  groq_api_key: ''
  mistral_api_key: ''
  cerebras_api_key: ''
  huggingface_token: ''
  github_token: ''
  aws_access_key_id: ''
  aws_secret_access_key: ''
  aws_region: ''
  azure_openai_api_key: ''
  additional_packages: []
schema:
  default_provider: >-
    list(anthropic|openai|google|openrouter|groq|xai|mistral|cerebras|huggingface|github-copilot|amazon-bedrock|google-vertex|azure-openai-responses)
  default_model: str?
  install_integration: bool?
  service_provider: >-
    list(anthropic|openai|google|openrouter|groq|xai|mistral|cerebras|huggingface|github-copilot|amazon-bedrock|google-vertex|azure-openai-responses)?
  service_model: str?
  anthropic_api_key: password?
  openai_api_key: password?
  google_api_key: password?
  openrouter_api_key: password?
  xai_api_key: password?
  groq_api_key: password?
  mistral_api_key: password?
  cerebras_api_key: password?
  huggingface_token: password?
  github_token: password?
  aws_access_key_id: password?
  aws_secret_access_key: password?
  aws_region: str?
  azure_openai_api_key: password?
  additional_packages:
    - str
